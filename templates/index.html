<!DOCTYPE html>
<html>
<head>
    <title>Student Academic Advisor Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🎓 Student Academic Advisor Chatbot</h1>

    <div id="chatbox"></div>

    <div class="input-area">

        <input
            type="text"
            id="message"
            placeholder="Ask your academic question..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

async function sendMessage() {

    let input = document.getElementById("message");

    let message = input.value;

    if (message.trim() === "") {
        return;
    }

    let chatbox = document.getElementById("chatbox");

    // Display user message
    chatbox.innerHTML +=
        `<p><b>You:</b> ${message}</p>`;

    try {

        let response = await fetch(
            "/get?msg=" + encodeURIComponent(message)
        );

        let botReply = await response.text();

        // Display bot response
        chatbox.innerHTML +=
            `<p><b>Bot:</b> ${botReply}</p>`;

    } catch (error) {

        chatbox.innerHTML +=
            `<p><b>Bot:</b> Error connecting to server.</p>`;

        console.error(error);
    }

    input.value = "";

    chatbox.scrollTop = chatbox.scrollHeight;
}

// Send message when Enter key is pressed
document.getElementById("message").addEventListener(
    "keypress",
    function(event) {

        if (event.key === "Enter") {
            sendMessage();
        }
    }
);

</script>

</body>
</html>
